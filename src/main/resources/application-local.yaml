spring:
  liquibase:
    contexts: local
  datasource:
    url: jdbc:postgresql://localhost:5432/cinema_booking
    username: cinema
    password: cinema
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      pool-name: CinemaBookingHikariPool-Local

security:
  jwt:
    secret: local-development-secret-do-not-use-in-production-must-be-at-least-32-bytes-long
    expiration-millis: 86400000
    issuer: cinema-booking-system-local

logging:
  level:
    org.example.cinemabookingsystem: DEBUG
    org.springframework.jdbc.core.JdbcTemplate: DEBUG
