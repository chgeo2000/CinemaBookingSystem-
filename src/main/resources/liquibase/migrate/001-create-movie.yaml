databaseChangeLog:
  - changeSet:
      id: 1
      author: georgechira
      comment: "add movie table"
      changes:
        - createTable:
            tableName: movie
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: title
                  type: varchar(50)
              - column:
                  name: description
                  type: varchar(1000)
              - column:
                  name: genre
                  type: varchar(30)
              - column:
                  name: director
                  type: varchar(30)
              - column:
                  name: language
                  type: varchar(30)
              - column:
                  name: duration
                  type: integer
              - column:
                  name: release_date
                  type: date
              - column:
                  name: rating
                  type: varchar(50)
              - column:
                  name: trailer_url
                  type: varchar(200)
